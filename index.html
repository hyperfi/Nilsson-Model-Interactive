<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>☢ Live Nilsson Diagram Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bar">
        <span class="ttl">☢ Nilsson Live</span>
        <div class="sep"></div>
        <div class="g">
            <label for="inpA">A =</label>
            <input type="number" id="inpA" value="80" min="1" max="300">
        </div>
        <div class="g">
            <label for="inpDMin">δ Min =</label>
            <input type="number" id="inpDMin" value="-0.5" step="0.1">
        </div>
        <div class="g">
            <label for="inpDMax">δ Max =</label>
            <input type="number" id="inpDMax" value="0.5" step="0.1">
        </div>
        <button class="btn active" id="btnComp">⚡ Compute</button>
        <div class="sep"></div>
        <div class="g">
            <label for="selUnit">Units =</label>
            <select id="selUnit">
                <option value="hw0">ℏω₀</option>
                <option value="MeV">MeV</option>
            </select>
        </div>
        <div class="sep"></div>
        <div class="g">
            <label for="ni">N =</label>
            <input type="number" id="ni" value="28" min="0" max="500">
        </div>
        <div class="g">
            <label for="ds">δ =</label>
            <input type="range" id="ds" min="-0.50" max="0.50" step="0.005" value="0.00">
            <span class="dv" id="dv">δ = 0.000</span>
        </div>
        <div class="sep"></div>
        <button class="btn" id="btnZoom" title="Drag a rectangle on the diagram to zoom">🔍 Zoom</button>
        <button class="btn" id="btnBack" style="display:none">↩ Back</button>
        <button class="btn danger" id="btnFull" style="display:none">⊠ Full</button>
        <span id="sm">Ready</span>
    </div>

    <div id="main">
        <div id="wrap">
            <canvas id="cv"></canvas>
            <div id="overlay">Computing Quantum States...</div>
        </div>
        <div id="panel">
            <div class="ph">Level Filling</div>
            <div id="ll"></div>
            <div id="gb">
                <div class="gl">Shell gap (Fermi→next):</div>
                <div class="gv" id="gv">—</div>
                <div class="fl">Fermi energy:</div>
                <div class="fv" id="fv">—</div>
            </div>
        </div>
    </div>
    <div id="tip"></div>

    <script type="module" src="main.js"></script>

</body>
</html>
